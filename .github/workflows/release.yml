name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create GitHub Releases
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4

      # git-fi requires git >= 2.50.0 (SPEC PF-02); prepublishOnly runs the
      # test suite, which drives the binary against real git repos.
      - name: Install current git
        run: |
          sudo add-apt-repository -y ppa:git-core/ppa
          sudo apt-get update
          sudo apt-get install -y git
          git --version

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      # Confirms NPM_API_TOKEN authenticates against the registry.
      - name: Verify npm auth
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_API_TOKEN }}

      # Publish to npm on a v* tag. Idempotent: skip if the version is already
      # published, so a tag can be re-pushed (e.g. to backfill a Release)
      # without failing on a version conflict. prepublishOnly runs the tests.
      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "@gettyimages/git-fi@${VERSION}" version >/dev/null 2>&1; then
            echo "@gettyimages/git-fi@${VERSION} already published — skipping npm publish."
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_API_TOKEN }}

      # Create a GitHub Release with auto-generated notes for the tag.
      # Idempotent: skip if a Release already exists for this tag.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
          else
            gh release create "$TAG" --verify-tag --generate-notes --title "$TAG"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      # Non-tag runs (workflow_dispatch): validate packaging without uploading.
      - name: Publish (dry run)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npm publish --dry-run --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_API_TOKEN }}
