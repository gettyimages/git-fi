name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci
      - run: npm test

  # Fail if the committed man page, completions, or docs tables are stale — i.e.
  # someone changed src/help.ts without re-running the generator. Keeps the
  # generated artifacts honest, since they ship in the npm package and the docs
  # site without being regenerated at publish time.
  generated:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run gen:docs
      - name: Verify generated files are up to date
        run: |
          if ! git diff --quiet -- man completions docs/commands.md; then
            echo "::error::Generated files are stale. Run 'npm run gen:docs' and commit the result."
            git diff -- man completions docs/commands.md
            exit 1
          fi
