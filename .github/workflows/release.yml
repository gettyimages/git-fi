name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4

      # git-fi requires git >= 2.50.0 (SPEC PF-02); prepublishOnly runs the
      # test suite, which drives the binary against real git repos.
      - name: Install current git
        run: |
          sudo add-apt-repository -y ppa:git-core/ppa
          sudo apt-get update
          sudo apt-get install -y git
          git --version

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      # Confirms NPM_API_TOKEN authenticates against the registry.
      - name: Verify npm auth
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_API_TOKEN }}

      # On a v* tag: real publish. prepublishOnly runs `npm test` as the gate.
      - name: Publish
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_API_TOKEN }}

      # Otherwise (branch push / manual run): validate packaging without uploading.
      - name: Publish (dry run)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npm publish --dry-run --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_API_TOKEN }}
